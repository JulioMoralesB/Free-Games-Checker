# Alembic configuration file for free-games-notifier

[alembic]
# Path to the alembic directory containing env.py and the versions/ folder
script_location = alembic

# Prepend sys.path so that config.py is importable from env.py
prepend_sys_path = .

# The database URL is set dynamically in alembic/env.py from config.py.
# Do NOT hardcode credentials here — leave this blank.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
