services:
  free-games-notifier:
    build:
      context: .
      args:
        LOCALE: ${LOCALE:-en_US.UTF-8}
    container_name: free-games-notifier
    environment:
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL} 
      - HEALTHCHECK_URL=${HEALTHCHECK_URL}
      - ENABLE_HEALTHCHECK=${ENABLE_HEALTHCHECK}
      - EPIC_GAMES_API_URL=${EPIC_GAMES_API_URL}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - TIMEZONE=${TIMEZONE:-UTC}
      - LOCALE=${LOCALE-en_US.UTF-8}
      - "DATE_FORMAT=${DATE_FORMAT:-%B %d, %Y at %I:%M %p}"
      - "EPIC_GAMES_REGION=${EPIC_GAMES_REGION:-en-US}"
      - SCHEDULE_TIME=${SCHEDULE_TIME:-12:00}
      - HEALTHCHECK_INTERVAL=${HEALTHCHECK_INTERVAL:-1}
      - API_KEY=${API_KEY}
      - API_HOST=${API_HOST:-0.0.0.0}
      - API_PORT=${API_PORT:-8000}
    image: free-games-notifier
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"
    restart: unless-stopped
    volumes:
      - type: bind
        source: ${DATA_PATH}
        target: /mnt/data
      - type: bind
        source: ${LOGS_PATH}
        target: /mnt/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - apollo-server-network

networks:
  apollo-server-network:
    external: true